{{ define "main" }}

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

{{ $bgImage := .Params.image | default "/images/default-bg.jpg" }}

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    overflow-x: hidden;
    font-family: 'Nunito', sans-serif;
  }

  :root {
    --abl-primary: #0080ff;
    --abl-accent: #86cc58;
    --abl-dark: #05333d;
  }

  /* ========================= HERO ========================= */
  .hero-container {
    position: relative;
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('{{ $bgImage | absURL }}');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    z-index: -1;
  }

  /* Overlay para garantir leitura do texto */
  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.80); 
    z-index: 0;
  }

  /* ========================= CONTEÚDO ========================= */
  .content-box {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 850px;
    padding-left: clamp(1.5rem, 6vw, 8rem);
    padding-right: clamp(1.5rem, 4vw, 4rem);
    padding-top: 5rem;
    padding-bottom: 5rem;
  }

  .page-title {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    color: var(--abl-dark);
    margin-bottom: 2rem;
    line-height: 1.1;
    position: relative;
    padding-left: 25px;
  }

  .page-title::before {
    content: '';
    position: absolute;
    left: 0;
    top: 5px;
    bottom: 5px;
    width: 8px;
    background: linear-gradient(to bottom, var(--abl-primary), var(--abl-accent));
    border-radius: 4px;
  }

  /* Estilização do Conteúdo que vem do Markdown */
  .markdown-content {
    font-size: 1.25rem;
    line-height: 1.7;
    color: #333;
  }

  .markdown-content p {
    margin-bottom: 1.5rem;
  }

  /* ========================= BOTÃO ========================= */
  .btn-wrapper {
    margin-top: 2.5rem;
  }

  .form-button {
    display: inline-block;
    padding: 1.1rem 2.2rem;
    background-color: var(--abl-dark);
    color: #fff !important;
    text-decoration: none;
    font-weight: 700;
    border-radius: 50px; /* Botão arredondado moderno */
    transition: all 0.3s ease;
    box-shadow: 0 8px 15px rgba(5, 51, 61, 0.2);
    border: none;
  }

  .form-button:hover {
    background-color: var(--abl-primary);
    transform: translateY(-3px);
    box-shadow: 0 12px 20px rgba(0, 128, 255, 0.3);
  }

</style>

<div class="hero-container">
  <div class="hero-bg"></div>

  <div class="content-box">
    <h1 class="page-title">
      {{ .Title }}
    </h1>

    <div class="markdown-content">
      {{ .Content }}
    </div>

    <div class="btn-wrapper">
      <a href="https://forms.gle/R4JXhcDsFCXGHi2T9" class="form-button">
        Acessar Formulário de Membro
      </a>
    </div>
  </div>
</div>

{{ end }}
