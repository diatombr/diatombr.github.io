{{ define "main" }}
<div class="mx-auto my-10 max-w-6xl">
  <div class="mx-3 px-2">
    <h1 class="title text-5xl mb-10">{{.Title}}</h1>
    
    <div class="content prose md:prose-lg lg:prose-xl max-w-none custom-about-content">
      {{.Content}}
    </div>
  </div>
</div>

<style>

/* TODO O SEU CSS ORIGINAL FOI MANTIDO */

:root {
  --abl-primary: #0080ff;
  --abl-accent: #86cc58;
  --abl-dark: #05333d;
  --abl-soft: #eef7fb;
  --abl-border: #e6eef5;
  --abl-bg-white: #ffffff;
  --abl-bg-gray: #f8f9fa;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
overflow-x:hidden;
font-family:'Nunito','Open Sans',Helvetica,Arial,sans-serif;
}

/* SEÇÕES */

.section-wrapper{
width:100vw;
position:relative;
left:50%;
margin-left:-50vw;
padding:80px 0;
display:flex;
justify-content:center;
align-items:center;
min-height:600px;
}

.section-wrapper:nth-of-type(odd){
background:var(--abl-bg-white);
}

.section-wrapper:nth-of-type(even){
background:var(--abl-bg-gray);
}

.section-inner{
width:100%;
max-width:1400px;
display:grid;
gap:60px;
padding:0 40px;
}

/* LAYOUT COM IMAGEM */

.section-wrapper.has-image .section-inner{
grid-template-columns:1.3fr 1fr;
}

.section-wrapper.no-image .section-inner{
grid-template-columns:1fr;
max-width:1000px;
}

.section-wrapper.layout-default.has-image .section-content{
grid-column:1;
}

.section-wrapper.layout-default.has-image .section-image{
grid-column:2;
}

.section-wrapper.layout-alternate.has-image .section-content{
grid-column:2;
}

.section-wrapper.layout-alternate.has-image .section-image{
grid-column:1;
order:-1;
}

/* TEXTO */

.section-content{
display:flex;
flex-direction:column;
justify-content:center;
}

.section-content h2{
font-size:2.5rem;
font-weight:700;
color:var(--abl-dark);
margin-bottom:1.5rem;
position:relative;
}

/* BARRAS */

/* BARRA LATERAL PARA LAYOUT DEFAULT (esquerda) */
  .section-wrapper.layout-default .section-content h2 {
    padding-left: 20px;
  }

  .section-wrapper.layout-default .section-content h2::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 6px;
    background: linear-gradient(to bottom, var(--abl-primary), var(--abl-accent));
    border-radius: 3px;
  }
  
  
/* BARRA LATERAL PARA LAYOUT ALTERNATE (direita) */
  .section-wrapper.layout-alternate .section-content h2 {
    padding-right: 20px;
    text-align: right;
  }

  .section-wrapper.layout-alternate .section-content h2::before {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 6px;
    background: linear-gradient(to bottom, var(--abl-accent), var(--abl-primary));
    border-radius: 3px;
  }

  /* QUANDO NÃO TEM IMAGEM: barra centralizada */
  .section-wrapper.no-image .section-content h2 {
    padding-left: 20px;
    padding-right: 20px;
    text-align: center;
  }

  .section-wrapper.no-image .section-content h2::before {
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 6px;
    width: 6px;
    top: auto;
    bottom: -10px;
    background: linear-gradient(to right, var(--abl-primary), var(--abl-accent));
  }

.section-content p{
font-size:1.125rem;
line-height:1.8;
color:#444;
margin-bottom:1.5rem;
}

.section-wrapper.layout-default p{
text-align:justify;
}

.section-wrapper.layout-alternate p{
text-align:justify;
}

.section-wrapper.no-image p{
text-align:justify;
}

/* IMAGEM */

.section-image{
min-height:400px;
}

.section-image img{
width:100%;
height:100%;
object-fit:cover;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

/* MISSÃO VISÃO VALORES */

.mvv-section{
width:100vw;
position:relative;
left:50%;
margin-left:-50vw;
padding:100px 0;
background:linear-gradient(180deg,#f7fbff,#eef4f9);
}

.mvv-container{
max-width:1200px;
margin:auto;
padding:0 40px;
}

.mvv-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
}

.mvv-card{
background:white;
padding:35px;
border-radius:16px;
box-shadow:0 12px 35px rgba(0,0,0,.08);
transition:.3s;
position:relative;
overflow:hidden;
}

.mvv-card:hover{
transform:translateY(-8px);
box-shadow:0 18px 40px rgba(0,0,0,.12);
}

.mvv-icon{
font-size:40px;
margin-bottom:2px;
color:var(--abl-primary);
}

.mvv-card h3{
font-size:1.6rem;
font-weight:700;
text-align:center;
margin-bottom:18px;
color:var(--abl-dark);
}

.mvv-card h3::after{
content:"";
display:block;
width:70px;
height:4px;
margin:10px auto 20px;
background:linear-gradient(to right,var(--abl-primary),var(--abl-accent));
border-radius:4px;
}

.mvv-card p{
text-align:left;
line-height:1.8;
font-size:1rem;
color:#444;
}

/* ÚLTIMA SEÇÃO CENTRALIZADA */

.section-wrapper:last-of-type .section-inner{
grid-template-columns:1fr;
justify-items:center;
text-align:center;
}

.section-wrapper:last-of-type .section-content{
max-width:750px;
margin:auto;
}

/* título */

.section-wrapper:last-of-type .section-content h2{
padding-left:0;
text-align:center;
}

.section-wrapper:last-of-type .section-content h2::before{
display:none;
}

.section-wrapper:last-of-type .section-content h2::after{
content:"";
display:block;
width:80px;
height:4px;
margin:12px auto 0;
background:linear-gradient(to right,var(--abl-primary),var(--abl-accent));
border-radius:4px;
}

/* DIRETORIA */

.diretoria-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:28px 80px;
margin-top:10px;
}

.diretoria-grid a{
text-decoration:none;
font-weight:500;
}

.diretoria-grid a:hover{
text-decoration:underline;
}

.diretoria-grid p{
text-align:left;
line-height:1.3;
font-size:1.05rem;
margin:4px;
}

.diretoria-grid strong{
display:block;
font-size:1.15rem;
font-weight: 500;
color:var(--abl-dark);
margin-bottom:0px;
}

/* RESPONSIVO */
  @media (max-width: 1200px) {
    .section-inner {
      max-width: 1080px;
      padding: 0 30px;
    }
  }

  @media (max-width: 980px) {
    .section-wrapper {
      padding: 60px 0;
    }
    
    .section-inner {
      grid-template-columns: 1fr !important;
      gap: 40px;
      padding: 0 20px;
    }
    
    /* Em mobile, todos ficam na mesma ordem */
    .section-wrapper.has-image.layout-alternate .section-image {
      order: -1;
    }
    
    /* Em mobile, barra lateral sempre à esquerda */
    .section-wrapper.layout-alternate .section-content h2,
    .section-wrapper.layout-default .section-content h2 {
      padding-left: 20px;
      padding-right: 0;
      text-align: left;
    }
    
    .section-wrapper.layout-alternate .section-content h2::before,
    .section-wrapper.layout-default .section-content h2::before {
      left: 0;
      right: auto;
      transform: none;
      width: 6px;
      height: 100%;
      top: 0;
      bottom: 0;
    }
    
    .section-wrapper.no-image .section-content h2 {
      padding-left: 20px;
      padding-right: 0;
      text-align: left;
    }
    
    .section-wrapper.no-image .section-content h2::before {
      left: 0;
      transform: none;
      width: 6px;
      height: 100%;
      top: 0;
      bottom: 0;
      background: linear-gradient(to bottom, var(--abl-primary), var(--abl-accent));
    }
    
    /* Em mobile, texto sempre justificado */
    .section-wrapper.layout-alternate .section-content p,
    .section-wrapper.no-image .section-content p {
      text-align: justify;
    }
    
    /* Em mobile, remove linha decorativa */
    .section-content.only-title::after {
      display: none;
    }
    
    .section-image {
      min-height: 300px;
    }
    
    .section-content h2 {
      font-size: 2rem;
    }
  }

  @media (max-width: 768px) {
    .section-wrapper {
      padding: 40px 0;
      min-height: 400px;
    }
    
    .section-content h2 {
      font-size: 1.75rem;
    }
    
    .section-content p {
      font-size: 1rem;
    }
  }

  /* ANIMAÇÃO DE ENTRADA */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .section-wrapper {
    animation: fadeInUp 0.6s ease-out;
  }


</style>


<script>
(function() {
  const organizeSections = function() {
    const content = document.querySelector('.custom-about-content');
    if (!content) return;

    const h2s = content.querySelectorAll('h2');
    
    h2s.forEach((h2, index) => {

      // Elementos até o próximo H2
      let nextElements = [];
      let currentElement = h2.nextElementSibling;
      
      while (currentElement && currentElement.tagName !== 'H2') {
        nextElements.push(currentElement);
        currentElement = currentElement.nextElementSibling;
      }

      /* DETECTAR MISSÃO / VISÃO / VALORES */

      const h3s = nextElements.filter(el => el.tagName === 'H3');

      if (h3s.length >= 3) {

        const section = document.createElement("div");
        section.className = "mvv-section";

        const container = document.createElement("div");
        container.className = "mvv-container";

        const grid = document.createElement("div");
        grid.className = "mvv-grid";

        section.appendChild(container);
        container.appendChild(grid);

        h2.parentNode.insertBefore(section, h2);

        const icons = ["🎯","🔭","⭐"];
        let currentCard = null;

        nextElements.forEach(el => {

          if (el.tagName === "H3") {

            currentCard = document.createElement("div");
            currentCard.className = "mvv-card";

            const icon = document.createElement("div");
            icon.className = "mvv-icon";
            icon.innerHTML = icons[grid.children.length] || "•";

            currentCard.appendChild(icon);
            currentCard.appendChild(el);

            grid.appendChild(currentCard);

          } else if (currentCard) {

            currentCard.appendChild(el);

          }

        });

        h2.remove();
        return;
      }

      /* ===== SCRIPT ORIGINAL DE SEÇÕES ===== */

      const textElements = [];
      const imageElements = [];
      
      nextElements.forEach(el => {
        if (el.tagName === 'P') {
          if (el.querySelector('img')) {
            imageElements.push(el);
          } else if (el.textContent.trim() !== '') {
            textElements.push(el);
          }
        } else if (el.tagName === 'IMG') {
          imageElements.push(el);
        }
      });

      const imageElement = imageElements[0];
      const img = imageElement ? 
        (imageElement.tagName === 'IMG' ? imageElement : imageElement.querySelector('img')) : 
        null;

      const wrapper = document.createElement('div');
      
      if (index % 2 === 0) {
        wrapper.className = 'section-wrapper layout-default';
      } else {
        wrapper.className = 'section-wrapper layout-alternate';
      }

      if (img) {
        wrapper.classList.add('has-image');
      } else {
        wrapper.classList.add('no-image');
      }

      const inner = document.createElement('div');
      inner.className = 'section-inner';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'section-content';

      h2.parentNode.insertBefore(wrapper, h2);

      wrapper.appendChild(inner);
      inner.appendChild(contentDiv);

      contentDiv.appendChild(h2);

      if (textElements.length > 0) {
        textElements.forEach(element => {
          contentDiv.appendChild(element);
        });
      } else {
        contentDiv.classList.add('only-title');
      }

      if (img) {
        const imageDiv = document.createElement('div');
        imageDiv.className = 'section-image';
        imageDiv.appendChild(img);
        inner.appendChild(imageDiv);
        
        if (imageElement.tagName === 'P' && imageElement.children.length === 1) {
          imageElement.remove();
        }
      }

      /* ===== DIRETORIA NA ÚLTIMA SEÇÃO ===== */

      if (!img && index === h2s.length - 1) {

        const ps = contentDiv.querySelectorAll("p");

        if (ps.length > 1) {

          const grid = document.createElement("div");
          grid.className = "diretoria-grid";

          ps.forEach(p => grid.appendChild(p));

          contentDiv.appendChild(grid);

        }

      }

      const emptyPs = contentDiv.querySelectorAll('p');
      emptyPs.forEach(p => {
        if (p.innerHTML.trim() === '' || p.textContent.trim() === '') {
          p.remove();
        }
      });

    });
    
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', organizeSections);
  } else {
    organizeSections();
  }

})();
</script>
{{end}}
