{{ define "main" }}

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<div class="mx-auto my-10 max-w-6xl">
  <div class="mx-3 px-2">
    <h1 class="title text-5xl mb-10">{{.Title}}</h1>

    <div class="content custom-about-content">
      {{.Content}}
    </div>
  </div>
</div>

<style>

/* RESET */

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
overflow-x:hidden;
font-family:'Nunito','Open Sans',Helvetica,Arial,sans-serif;
}

/* CORES */

:root{
--abl-primary:#0080ff;
--abl-accent:#86cc58;
--abl-dark:#05333d;
--abl-bg-white:#ffffff;
--abl-bg-gray:#f6f8fb;
}

/* SEÇÕES */

.section-wrapper{
width:100vw;
position:relative;
left:50%;
margin-left:-50vw;
padding:90px 0;
display:flex;
justify-content:center;
}

.section-wrapper:nth-of-type(odd){
background:var(--abl-bg-white);
}

.section-wrapper:nth-of-type(even){
background:var(--abl-bg-gray);
}

.section-inner{
max-width:1200px;
display:grid;
grid-template-columns:1.2fr 1fr;
gap:60px;
padding:0 40px;
align-items:center;
}

.layout-alternate .section-content{
order:2;
}

.layout-alternate .section-image{
order:1;
}

/* TEXTO */

.section-content h2{
font-family:'Nunito',sans-serif;
font-size:2.5rem;
font-weight:700;
color:var(--abl-dark);
margin-bottom:1.5rem;
line-height:1.2;
position:relative;
padding-left:20px;
}

.section-content h2::before{
content:'';
position:absolute;
left:0;
top:0;
bottom:0;
width:6px;
background:linear-gradient(to bottom,var(--abl-primary),var(--abl-accent));
border-radius:3px;
}

.section-content p{
font-size:1.125rem;
line-height:1.8;
text-align:justify;
color:#444;
}

/* IMAGEM */
  .section-image {
    position: relative;
    height: 100%;
    min-height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .section-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease;
  }

  .section-image img:hover {
    transform: translateY(-5px);
  }

/* MISSÃO VISÃO VALORES */

.mvv-section{
width:100vw;
position:relative;
left:50%;
margin-left:-50vw;
padding:100px 0;
background:linear-gradient(180deg,#f7fbff,#eef4f9);
}

.mvv-container{
max-width:1200px;
margin:auto;
padding:0 40px;
}

.mvv-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
}

.mvv-card{
background:white;
padding:35px 35px;
border-radius:16px;
box-shadow:0 12px 35px rgba(0,0,0,.08);
transition:.3s;
position:relative;
overflow:hidden;
}

.mvv-card:hover{
transform:translateY(-8px);
box-shadow:0 18px 40px rgba(0,0,0,.12);
}

.mvv-icon{
font-size:40px;
margin-bottom:2px;
color:var(--abl-primary);
}

.mvv-card h3{
font-size:1.6rem;
font-weight:700;
text-align:center;
margin-bottom:18px;
color:var(--abl-dark);
}

.mvv-card h3::after{
content:"";
display:block;
width:70px;
height:4px;
margin:10px auto 20px;
background:linear-gradient(to right,var(--abl-primary),var(--abl-accent));
border-radius:4px;
}

.mvv-card p{
text-align:left;
line-height:1.8;
font-size:1rem;
color:#444;
}

/* ÚLTIMA SEÇÃO CENTRALIZADA */

.section-wrapper:last-of-type .section-inner{
grid-template-columns:1fr;
justify-items:center;
text-align:center;
}

.section-wrapper:last-of-type .section-content{
max-width:750px;
margin:auto;
}

/* título */

.section-wrapper:last-of-type .section-content h2{
padding-left:0;
text-align:center;
}

.section-wrapper:last-of-type .section-content h2::before{
display:none;
}

.section-wrapper:last-of-type .section-content h2::after{
content:"";
display:block;
width:80px;
height:4px;
margin:12px auto 0;
background:linear-gradient(to right,var(--abl-primary),var(--abl-accent));
border-radius:4px;
}

/* GRID DA DIRETORIA (apenas parágrafos) */

.diretoria-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:28px 80px;
margin-top:10px;
}

.diretoria-grid a{
text-decoration:none;
font-weight:500;
}

.diretoria-grid a:hover{
text-decoration:underline;
}

.diretoria-grid p{
text-align:left;
line-height:1.3;
font-size:1.05rem;
margin:4px;
}

.diretoria-grid strong{
display:block;
font-size:1.15rem;
font-weight: 500;
color:var(--abl-dark);
margin-bottom:0px;
}

/* RESPONSIVO */
  @media (max-width: 1200px) {
    .section-inner {
      max-width: 1080px;
      padding: 0 30px;
    }
  }

  @media (max-width: 980px) {
    .section-wrapper {
      padding: 60px 0;
    }
    
    .section-inner {
      grid-template-columns: 1fr !important;
      gap: 40px;
      padding: 0 20px;
    }
    
    /* Em mobile, todos ficam na mesma ordem */
    .section-wrapper.has-image.layout-alternate .section-image {
      order: -1;
    }
    
    /* Em mobile, barra lateral sempre à esquerda */
    .section-wrapper.layout-alternate .section-content h2,
    .section-wrapper.layout-default .section-content h2 {
      padding-left: 20px;
      padding-right: 0;
      text-align: left;
    }
    
    .section-wrapper.layout-alternate .section-content h2::before,
    .section-wrapper.layout-default .section-content h2::before {
      left: 0;
      right: auto;
      transform: none;
      width: 6px;
      height: 100%;
      top: 0;
      bottom: 0;
    }
    
    .section-wrapper.no-image .section-content h2 {
      padding-left: 20px;
      padding-right: 0;
      text-align: left;
    }
    
    .section-wrapper.no-image .section-content h2::before {
      left: 0;
      transform: none;
      width: 6px;
      height: 100%;
      top: 0;
      bottom: 0;
      background: linear-gradient(to bottom, var(--abl-primary), var(--abl-accent));
    }
    
    /* Em mobile, texto sempre justificado */
    .section-wrapper.layout-alternate .section-content p,
    .section-wrapper.no-image .section-content p {
      text-align: justify;
    }
    
    /* Em mobile, remove linha decorativa */
    .section-content.only-title::after {
      display: none;
    }
    
    .section-image {
      min-height: 300px;
    }
    
    .section-content h2 {
      font-size: 2rem;
    }
  }

  @media (max-width: 768px) {
    .section-wrapper {
      padding: 40px 0;
      min-height: 400px;
    }
    
    .section-content h2 {
      font-size: 1.75rem;
    }
    
    .section-content p {
      font-size: 1rem;
    }
  }

  /* ANIMAÇÃO DE ENTRADA */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .section-wrapper {
    animation: fadeInUp 0.6s ease-out;
  }

</style>


<script>

(function(){

var content=document.querySelector(".custom-about-content");
if(!content) return;

var h2s=Array.from(content.querySelectorAll("h2"));

h2s.forEach(function(h2,index){

var elements=[];
var el=h2.nextElementSibling;

while(el && el.tagName!=="H2"){
elements.push(el);
el=el.nextElementSibling;
}

/* detectar missão visão valores */

var h3s=elements.filter(function(e){
return e.tagName==="H3";
});

if(h3s.length>=3){

var section=document.createElement("div");
section.className="mvv-section";

var container=document.createElement("div");
container.className="mvv-container";

var grid=document.createElement("div");
grid.className="mvv-grid";

section.appendChild(container);
container.appendChild(grid);

h2.parentNode.insertBefore(section,h2);

var icons=["🎯","🔭","⭐"];

var currentCard=null;

elements.forEach(function(el){

if(el.tagName==="H3"){

currentCard=document.createElement("div");
currentCard.className="mvv-card";

var icon=document.createElement("div");
icon.className="mvv-icon";
icon.innerHTML=icons[grid.children.length]||"•";

currentCard.appendChild(icon);
currentCard.appendChild(el);

grid.appendChild(currentCard);

}else{

if(currentCard){
currentCard.appendChild(el);
}

}

});

h2.remove();
return;

}

/* seção normal */

var img=elements.find(function(e){
return e.querySelector && e.querySelector("img");
});

var wrapper=document.createElement("div");

wrapper.className="section-wrapper "+(index%2?"layout-alternate":"layout-default");

var inner=document.createElement("div");
inner.className="section-inner";

var text=document.createElement("div");
text.className="section-content";

wrapper.appendChild(inner);
inner.appendChild(text);

h2.parentNode.insertBefore(wrapper,h2);

text.appendChild(h2);

elements.forEach(function(e){
if(!(e.querySelector && e.querySelector("img"))){
text.appendChild(e);
}
});

if(img){

var imgDiv=document.createElement("div");
imgDiv.className="section-image";

imgDiv.appendChild(img.querySelector("img"));

inner.appendChild(imgDiv);

img.remove();

}

/* SE FOR A ÚLTIMA SEÇÃO SEM IMAGEM → aplicar grid de diretoria */

if(!img && index===h2s.length-1){

var ps = text.querySelectorAll("p");

if(ps.length>1){

var grid=document.createElement("div");
grid.className="diretoria-grid";

ps.forEach(function(p){
grid.appendChild(p);
});

text.appendChild(grid);

}

}

});

})();

</script>

{{ end }}
