baseURL = "https://diatombr.github.io/"
title = "Rede Brasileira de Diatomólogos"
author = "Rede Brasileira de Diatomólogos"
languageCode = "pt-BR"  # Mudei para português do Brasil
DefaultContentLanguage = "pt"  # Mudei para português
enableInlineShortcodes = true
theme = "tella"
enableRobotsTXT = true

# Please enable this feature if the site is available in Japanese, Chinese or Korean.
#hasCJKLanguage = true

# If you're using Google Analytics, you can enable this feature.
#googleAnalytics = "UA-12345678-1"

# Disqus Comment System
#disqusShortname = ""

[params]
  # Configurações principais
  showBlog = false
  showStrip = false
  mainSections = ['blog']
  googleFonts = true
  disable_assets = true  # Desabilita processamento CSS avançado

  # Logo
  [params.logo]
    main = "img/logo/logo_final.svg"
    alt = "Diatom Logo"
    size = "h-14"

  # Site
  [params.site]
    name = "Rede Brasileira de Diatomólogos"

  # Icon
  [params.icon]
    fontawesome = true

  # Homepage Meta Tags
  [params.homepage_meta_tags]
    meta_description = "Rede Brasileira de Diatomólogos - Comunidade de pesquisadores e estudiosos de diatomáceas no Brasil"
    meta_og_title = "Rede Brasileira de Diatomólogos"
    meta_og_type = "website"
    meta_og_url = "https://diatombr.github.io/"
    meta_og_image = "https://raw.githubusercontent.com/opera7133/tella/master/images/tn.png"
    meta_og_description = "Rede Brasileira de Diatomólogos - Comunidade de pesquisadores e estudiosos de diatomáceas no Brasil"
    meta_twitter_card = "summary_large_image"
    meta_twitter_site = "@diatombr"
    meta_twitter_creator = "@diatombr"

